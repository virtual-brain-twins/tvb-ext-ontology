name: 'Publish Release on Pypi'

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      branch:
        description: 'The target branch'
        required: false
      release_url:
        description: 'The URL of the draft GitHub release'
        required: false
      steps_to_skip:
        description: 'Comma separated list of steps to skip'
        required: false
      version:
        description: 'Version to publish, required for manual runs'
        required: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          python -m pip install -U "jupyterlab>=4.0.0,<5" setuptools twine build packaging
      - name: Set version from tag
        run: |
          TAG="${{ github.event.release.tag_name || github.event.inputs.version }}"
          VERSION="${TAG#v}"
          echo "Setting version to $VERSION"
          npm version "$VERSION" --no-git-tag-version
      - name: Build package
        run: |
          python -m build
      - name: Release on Pypi
        env:
          TWINE_USERNAME: ${{ secrets.PYPI_USER }}
          TWINE_PASSWORD: ${{ secrets.PYPI_PASS }}
        run: |
          echo "Publishing on pypi..."
          twine upload dist/*